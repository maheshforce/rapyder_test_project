apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
data:
  default.conf: |
    server {
      listen 80;

      location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
      }

      location /stub_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
      }
    }
