apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/maheshforce/rapyder_test_project.git
    targetRevision: dev
    path: app/helm/nginx-sample
    helm:
      valueFiles:
        - dev-values.yaml   # optional if exists

  destination:
    server: https://kubernetes.default.svc
    namespace: default   # change if needed

  syncPolicy:
    automated:
      prune: true
      selfHeal: true