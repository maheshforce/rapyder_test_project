apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: app-spot-t3-small
spec:
  weight: 90          # Spot preferred ~90%
  limits:
    cpu: 6
    memory: 12Gi
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: app-infra
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot"]
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values: ["t3.small"]
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
